{% extends "base.html" %}
{% block title %}Sign up{% endblock %}
{% block content %}
<section class="auth-form">
    <h1>Create your account</h1>
    <form method="POST" novalidate>
        <div class="form-group">
            <label for="name">Full name</label>
            <input type="text" id="name" name="name" autocomplete="name" required>
        </div>
        <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" autocomplete="email" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="new-password" minlength="8" required aria-describedby="password-help">
            <p id="password-help" class="form-hint">At least 8 characters.</p>
        </div>
        <div class="form-group">
            <label for="role">I am a</label>
            <select id="role" name="role">
                <option value="fan">Fan / attendee</option>
                <option value="volunteer">Volunteer / staff</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Sign up</button>
    </form>
    <p>Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
</section>
{% endblock %}

{% extends "base.html" %}
{% block title %}Transport{% endblock %}
{% block content %}
<section aria-labelledby="transport-heading">
    <h1 id="transport-heading">Getting to the stadium</h1>
    <form id="transport-form">
        <div class="form-group">
            <label for="distance">Distance from your location (km)</label>
            <input type="number" id="distance" name="distance_km" min="0" step="0.1" required>
        </div>
        <button type="submit" class="btn btn-primary">Get recommendations</button>
    </form>
    <div id="transport-result" role="status" aria-live="polite"></div>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/transport.js') }}" defer></script>
{% endblock %}
